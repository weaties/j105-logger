# Eval cases for /pr-checklist skill
# Tests whether the skill correctly resolves risk tiers and applies
# the appropriate verification steps for each tier.

- name: critical-tier-full-checklist
  description: Applies full Critical-tier verification for auth module changes
  type: preference
  scenario: |
    A PR touches auth.py (magic-link authentication middleware) and storage.py
    (adding a new migration). These are both Critical-tier modules. The PR
    checklist must require the full set of Critical-tier checks including
    integration tests, data-license review, and spec review.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/auth.py
    src/helmlog/storage.py
    tests/test_auth.py
    tests/test_storage.py
  expected:
    - criterion: "Must resolve risk tier as Critical (auth.py + storage.py with migrations)"
      weight: critical
    - criterion: "Must require integration tests"
      weight: critical
    - criterion: "Must require /data-license review"
      weight: critical
    - criterion: "Must require spec review (check if structured spec exists on the issue)"
      weight: critical
    - criterion: "Must require full test suite, lint, format, and mypy"
      weight: important
    - criterion: "Must require complexity check on touched files"
      weight: important
  anti_expected:
    - criterion: "Must NOT skip any Critical-tier checks"
      weight: critical
    - criterion: "Must NOT resolve as Standard or High tier"
      weight: critical
  tags: [critical, auth, storage, full-checklist]

- name: low-tier-minimal-checklist
  description: Applies minimal Low-tier verification for CSS-only changes
  type: preference
  scenario: |
    A PR only touches CSS and HTML template files. These are Low-tier changes.
    Tests, mypy, and complexity checks are optional. Lint and format checks
    are still required.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/static/base.css
    src/helmlog/templates/history.html
  expected:
    - criterion: "Must resolve risk tier as Low (only CSS and templates)"
      weight: critical
    - criterion: "Must require lint and format checks"
      weight: critical
    - criterion: "Must mark tests as optional for Low tier"
      weight: important
    - criterion: "Must mark mypy as optional for Low tier"
      weight: important
    - criterion: "Must NOT require integration tests, data-license review, or spec review"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Standard, High, or Critical tier"
      weight: critical
    - criterion: "Must NOT require integration tests for CSS/template changes"
      weight: important
  tags: [low, css, templates, minimal]

- name: high-tier-federation-changes
  description: Requires integration tests for High-tier federation module changes
  type: preference
  scenario: |
    A PR touches peer_api.py and peer_client.py, both High-tier modules.
    Since these are federation/co-op code, integration tests are required.
    Data-license review should be triggered because peer_api.py serves co-op data.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/peer_api.py
    src/helmlog/peer_client.py
    tests/test_peer_api.py
    tests/integration/test_federation_e2e.py
  expected:
    - criterion: "Must resolve risk tier as High (peer_api.py + peer_client.py)"
      weight: critical
    - criterion: "Must require integration tests (federation/co-op code)"
      weight: critical
    - criterion: "Must require data-license review (peer_api.py serves co-op data)"
      weight: important
    - criterion: "Must require full test suite, lint, format, and mypy"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Standard or Low tier"
      weight: critical
    - criterion: "Must NOT skip integration tests for federation code"
      weight: critical
  tags: [high, federation, integration-tests]

- name: mixed-tier-resolves-to-highest
  description: Resolves to the highest tier when multiple tiers are touched
  type: preference
  scenario: |
    A PR touches files from multiple tiers: base.css (Low), web.py (Standard),
    and export.py (High). The PR's tier must be the highest touched — High.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/static/base.css
    src/helmlog/web.py
    src/helmlog/export.py
    tests/test_export.py
  expected:
    - criterion: "Must resolve risk tier as High (highest of Low + Standard + High)"
      weight: critical
    - criterion: "Must explain the tier resolution — which file drove the tier"
      weight: important
    - criterion: "Must apply High-tier checks (tests, lint, mypy required; integration tests if federation-related)"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Standard or Low — must use the highest tier"
      weight: critical
  tags: [mixed-tier, resolution, highest-wins]

- name: complexity-flag-over-200-lines
  description: Flags modules that exceed the 200-line convention
  type: preference
  scenario: |
    A PR adds 40 lines to web.py, which is already 350 lines long. The
    complexity check should flag this module as exceeding the 200-line
    convention and recommend considering a split.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/web.py
    tests/test_web.py

    wc -l output:
    390 src/helmlog/web.py
  expected:
    - criterion: "Must flag web.py as exceeding the 200-line module size convention"
      weight: critical
    - criterion: "Must recommend considering a module split before merging"
      weight: important
  anti_expected:
    - criterion: "Must NOT silently pass the complexity check when a file exceeds 200 lines"
      weight: critical
  tags: [complexity, module-size, 200-line-convention]

- name: issue-linking-verification
  description: Verifies PR body contains issue linking when working on an issue
  type: preference
  scenario: |
    A developer is creating a PR for work on issue #345. The PR body should
    contain "Closes #345" or "Fixes #345" for GitHub to auto-close the issue
    on merge.
  mock_input: |
    Working on issue #345. All checks pass. Ready to create PR.
    Current PR body draft: "## Summary\nAdd heel angle to CSV export.\n\n## Test plan\n- Unit tests added"
  expected:
    - criterion: "Must flag the missing issue linking (no 'Closes #345' or 'Fixes #345' in the body)"
      weight: critical
    - criterion: "Must recommend adding 'Closes #345' to the PR body"
      weight: important
  anti_expected:
    - criterion: "Must NOT create the PR without issue linking"
      weight: important
  tags: [issue-linking, pr-body, auto-close]

# --- Wave 2: Hardened cases (edge cases, ambiguity, misdirection) ---

- name: storage-without-migration-not-critical
  description: Correctly resolves storage.py change as Standard when no migration is touched
  type: preference
  scenario: |
    A PR modifies storage.py to add a new query method, but does NOT add or
    change any migration. The risk tier table says storage.py is Critical only
    "if migrations changed." A read-only query addition should be Standard,
    not Critical.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/storage.py
    tests/test_storage.py

    git diff main...HEAD -- src/helmlog/storage.py:
    @@ -400,6 +400,12 @@ class Storage:
    +    async def get_session_stats(self, session_id: int) -> dict:
    +        """Return aggregate stats for a session."""
    +        row = await self.db.execute_fetchone(
    +            "SELECT count(*), min(ts), max(ts) FROM instruments WHERE session_id = ?",
    +            (session_id,),
    +        )
    +        return {"count": row[0], "min_ts": row[1], "max_ts": row[2]}
  expected:
    - criterion: "Must resolve risk tier as Standard, NOT Critical — storage.py is only Critical when migrations are changed"
      weight: critical
    - criterion: "Must examine the actual diff to confirm no migration code is touched"
      weight: important
    - criterion: "Must NOT require integration tests, data-license review, or spec review for a Standard-tier change"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Critical just because storage.py is in the changed files"
      weight: critical
  tags: [tier-resolution, storage, edge-case, no-migration]

- name: new-unclassified-module-defaults-standard
  description: Correctly defaults a new module to Standard tier
  type: preference
  scenario: |
    A PR introduces a brand-new module (weather_overlay.py) that doesn't
    appear in the risk tier table. Per CLAUDE.md rules, new modules default
    to Standard until explicitly classified.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/weather_overlay.py
    tests/test_weather_overlay.py
  expected:
    - criterion: "Must resolve risk tier as Standard (new module defaults to Standard)"
      weight: critical
    - criterion: "Must note that the module is not yet in the risk tier table and should be classified"
      weight: important
    - criterion: "Must require tests, lint, format, and mypy (Standard tier)"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Low just because the module is new"
      weight: important
    - criterion: "Must NOT resolve as Critical or High without justification"
      weight: important
  tags: [tier-resolution, new-module, default-standard]

- name: test-only-changes-still-need-lint
  description: Requires lint and format checks even when only test files changed
  type: preference
  scenario: |
    A PR only modifies test files — adding new test cases and updating
    fixtures. No source code changed. The tests themselves still need to
    pass lint and format checks.
  mock_input: |
    git diff --name-only main...HEAD:
    tests/test_storage.py
    tests/test_web.py
    tests/conftest.py
  expected:
    - criterion: "Must resolve risk tier as Standard (test files are .py files, default Standard)"
      weight: critical
    - criterion: "Must require lint and format checks"
      weight: critical
    - criterion: "Must require running the test suite (to confirm the new tests pass)"
      weight: important
  anti_expected:
    - criterion: "Must NOT skip lint/format just because only test files changed"
      weight: critical
    - criterion: "Must NOT resolve as Low (test files are .py, not docs/config)"
      weight: important
  tags: [test-only, lint, tier-resolution]

- name: critical-file-in-large-diff-drives-tier
  description: A single Critical file among many Standard/Low files drives the whole PR to Critical
  type: preference
  scenario: |
    A large PR touches 12 files: 8 template/CSS files (Low), 3 web.py/polar.py
    files (Standard), and 1 line change in federation.py (Critical). The entire
    PR must be treated as Critical because of that one file.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/templates/home.html
    src/helmlog/templates/history.html
    src/helmlog/templates/session.html
    src/helmlog/templates/base.html
    src/helmlog/static/base.css
    src/helmlog/static/home.js
    src/helmlog/static/history.js
    src/helmlog/static/session.js
    src/helmlog/web.py
    src/helmlog/polar.py
    src/helmlog/races.py
    src/helmlog/federation.py
    tests/test_web.py
  expected:
    - criterion: "Must resolve risk tier as Critical (federation.py is Critical)"
      weight: critical
    - criterion: "Must explicitly identify federation.py as the file that drives the tier"
      weight: important
    - criterion: "Must require the full Critical checklist: integration tests, data-license, spec review"
      weight: critical
    - criterion: "Must require complexity check — flag any .py file exceeding 200 lines"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve as Standard or Low even though most files are Low/Standard tier"
      weight: critical
    - criterion: "Must NOT skip Critical-tier checks because 'most of the PR is just templates'"
      weight: critical
  tags: [tier-escalation, critical-in-large-diff, federation]

- name: pr-without-issue-no-linking-needed
  description: Does not require issue linking when the PR is not related to any issue
  type: preference
  scenario: |
    A developer creates a PR for a small refactoring that was not tracked by
    any GitHub issue. The PR checklist step 13 says "If this PR resolves a
    GitHub issue, confirm the PR body contains Closes #N." If there's no
    issue, this step should pass without requiring a link.
  mock_input: |
    git diff --name-only main...HEAD:
    src/helmlog/polar.py
    tests/test_polar.py

    No linked issue. PR body: "## Summary\nRefactor polar lookup to use dict instead of linear scan.\n\n## Test plan\n- Existing tests pass, performance benchmark shows 3x speedup"
  expected:
    - criterion: "Must NOT flag the PR for missing issue linking when there is no related issue"
      weight: critical
    - criterion: "Must still run all Standard-tier checks (tests, lint, format, mypy, complexity)"
      weight: important
  anti_expected:
    - criterion: "Must NOT require Closes #N when the PR is not resolving any issue"
      weight: critical
  tags: [issue-linking, no-issue, edge-case]

- name: docs-only-pr-correctly-classified
  description: Correctly classifies a docs-only PR as Low tier with minimal checks
  type: preference
  scenario: |
    A PR only updates documentation markdown files and the ideation log.
    No code, no templates, no scripts. This should be the lightest possible
    review.
  mock_input: |
    git diff --name-only main...HEAD:
    docs/ideation-log.md
    docs/data-licensing.md
    CLAUDE.md
  expected:
    - criterion: "Must resolve risk tier as Low (all files are docs/config)"
      weight: critical
    - criterion: "Must require lint and format checks"
      weight: important
    - criterion: "Must mark tests and mypy as optional"
      weight: important
    - criterion: "Must NOT require integration tests, data-license review, or spec review"
      weight: important
  anti_expected:
    - criterion: "Must NOT resolve higher than Low for documentation-only changes"
      weight: critical
  tags: [docs-only, low-tier, minimal]
