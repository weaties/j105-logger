# helmlog nginx reverse proxy
# All services accessible via a single port (80) with path-based routing.
#
# Managed by setup.sh — do not edit directly on the Pi.

upstream helmlog {
    server 127.0.0.1:3002;
}

upstream grafana {
    server 127.0.0.1:3001;
}

upstream signalk {
    server 127.0.0.1:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow photo uploads up to 20 MB (nginx default is 1 MB)
    client_max_body_size 20m;

    # helmlog — root path
    location / {
        proxy_pass http://helmlog;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (SSE / future WS endpoints)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Grafana — /grafana/
    # Grafana handles the sub-path itself (GF_SERVER_SERVE_FROM_SUB_PATH=true),
    # so pass the full /grafana/ prefix through (no trailing slash on proxy_pass).
    location /grafana/ {
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana live / WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Signal K — /signalk/
    # Signal K natively serves under /signalk/ so we proxy the whole prefix.
    location /signalk/ {
        proxy_pass http://signalk/signalk/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Signal K WebSocket stream
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Signal K streams can be long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Signal K admin UI — accessible at /sk/
    # SK serves its admin app at /admin/ with relative asset paths, so we
    # use sub_filter to rewrite the redirect from / → /admin/ into /sk/admin/.
    # All SK paths (admin UI, plugins, static assets) are proxied transparently.
    location /sk/ {
        proxy_pass http://signalk/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Rewrite redirects from SK (e.g. / → /admin/) to include /sk/ prefix
        proxy_redirect / /sk/;
    }
}
