# j105-logger nginx reverse proxy
# All services accessible via a single port (80) with path-based routing.
#
# Managed by setup.sh — do not edit directly on the Pi.

upstream j105_logger {
    server 127.0.0.1:3002;
}

upstream grafana {
    server 127.0.0.1:3001;
}

upstream signalk {
    server 127.0.0.1:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # j105-logger — root path
    location / {
        proxy_pass http://j105_logger;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (SSE / future WS endpoints)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Grafana — /grafana/
    # Grafana handles the sub-path itself (GF_SERVER_SERVE_FROM_SUB_PATH=true),
    # so pass the full /grafana/ prefix through (no trailing slash on proxy_pass).
    location /grafana/ {
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana live / WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Signal K — /signalk/
    # Signal K natively serves under /signalk/ so we proxy the whole prefix.
    location /signalk/ {
        proxy_pass http://signalk/signalk/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Signal K WebSocket stream
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Signal K streams can be long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Signal K admin UI — SK serves its web app at /admin/ with relative
    # asset paths (./assets/...), so we proxy /admin/ straight through.
    # j105-logger has no /admin/ route, so there's no conflict.
    location /admin/ {
        proxy_pass http://signalk/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Signal K also serves plugin pages and other paths at its root
    location /@signalk/ {
        proxy_pass http://signalk/@signalk/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
