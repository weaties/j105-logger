;p&gt;Series&lt;/p&gt;&lt;/td&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;411\&#34;&gt;&lt;p&gt;Wednesday&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;153\&#34;&gt;&lt;p&gt;Spring&lt;/p&gt;&lt;/td&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;411\&#34;&gt;&lt;p&gt;April 8, April 15, April 22, April 29, May 6 &amp;amp; May 13&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;153\&#34;&gt;&lt;p&gt;Solstice&lt;/p&gt;&lt;/td&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;411\&#34;&gt;&lt;p&gt;May 20, May 27, Jun 3, Jun 10, Jun 17, Jun 24&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;153\&#34;&gt;&lt;p&gt;Summer&lt;/p&gt;&lt;/td&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;411\&#34;&gt;&lt;p&gt;July 8, July 15, July 22, July 29, Aug 5&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;153\&#34;&gt;&lt;p&gt;Fall&lt;/p&gt;&lt;/td&gt;&lt;td colspan=\&#34;1\&#34; rowspan=\&#34;1\&#34; colwidth=\&#34;411\&#34;&gt;&lt;p&gt;Aug 12, Aug 19, Aug 26, Sep 2, Sep 9&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h3&gt;Location:&lt;/h3&gt;&lt;p&gt;Shilshole Bay, Seattle - WA&lt;/p&gt;&lt;h3&gt;Classes:&lt;/h3&gt;&lt;p&gt;This event is open to one-design keelboats with 5 or more entrants and boats racing under the handicap rating systems of PHRF-NW, ORC-Club and ORC-Club Doublehanded.&lt;/p&gt;&lt;h3&gt;Event Schedule:&lt;/h3&gt;&lt;p&gt;1745 – 1800 &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Practice starts (when available)&lt;/p&gt;&lt;p&gt;1815 &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; First warning signal&lt;/p&gt;&lt;p&gt;Sunset&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; No warning signal after this time&lt;/p&gt;&lt;p&gt;After racing social at CYC clubhouse. Bar is open!&lt;/p&gt;&lt;h3&gt;Courses:&lt;/h3&gt;&lt;p&gt;Courses will typically be windward / leeward and may include gates, offsets, and gybe marks. Two to four races are targeted for each day. Target race duration is 20 to 40 minutes.&lt;/p&gt;&lt;h3&gt;Awards:&lt;/h3&gt;&lt;p&gt;Presented at BBQ at the end of each series.&lt;/p&gt;&#34;,&#34;email&#34;:&#34;anderjonathan@gmail.com&#34;,&#34;imageURL&#34;:&#34;https://d282wvk2qi4wzk.cloudfront.net/Nfnxpdihojsj_ueeOn9VRev_regattaLogo_1741122632680&#34;,&#34;imageCrop&#34;:&#34;contain&#34;,&#34;deposits&#34;:false,&#34;deposit_rule&#34;:&#34;all_entries&#34;,&#34;has_series_scoring&#34;:&#34;true&#34;,&#34;series_throwouts&#34;:&#34;sub_event&#34;,&#34;hide_overall_series_tab&#34;:false,&#34;housing&#34;:false,&#34;housing_approval&#34;:&#34;entire_event&#34;,&#34;collect_emergencyContact&#34;:false,&#34;collect_gender&#34;:false,&#34;collect_sailNumber&#34;:true,&#34;collect_medicalDetails&#34;:false,&#34;waitlist_payments&#34;:&#34;deferred&#34;,&#34;waitlist_updates&#34;:&#34;automatic&#34;,&#34;waitlist_accepted_logic&#34;:true,&#34;superAdmin&#34;:{&#34;__type&#34;:&#34;Pointer&#34;,&#34;className&#34;:&#34;_User&#34;,&#34;objectId&#34;:&#34;5DVygXHOVl&#34;},&#34;archived&#34;:false,&#34;pending&#34;:false,&#34;public&#34;:true,&#34;cloned_from&#34;:{&#34;__type&#34;:&#34;Pointer&#34;,&#34;className&#34;:&#34;regattas&#34;,&#34;objectId&#34;:&#34;ueeOn9VRev&#34;},&#34;createdAt&#34;:&#34;2026-03-05T20:36:19.336Z&#34;,&#34;up
