<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HelmLog — Reset Password</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg-primary, #0a1628);color:var(--text-primary, #e8eaf0);
padding:16px;max-width:480px;margin:0 auto}
h1{font-size:1.3rem;font-weight:700;color:var(--accent, #7eb8f7);margin-bottom:16px}
.card{background:var(--bg-secondary, #131f35);border-radius:12px;padding:20px}
label{font-size:.85rem;color:var(--text-secondary, #8892a4);display:block;margin-bottom:6px}
input{width:100%;background:var(--bg-input, #0a1628);border:1px solid var(--accent-strong, #2563eb);border-radius:8px;
padding:12px;color:var(--text-primary, #e8eaf0);font-size:1rem;margin-bottom:14px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;
font-size:1rem;font-weight:700;cursor:pointer;background:var(--accent-strong, #2563eb);color:var(--text-primary, #e8eaf0)}
</style>
</head>
<body>
<h1>Reset Password</h1>
<div class="card">
<form method="post" action="/auth/reset-password">
<input type="hidden" name="token" value="{{ token }}"/>
<label>New password</label>
<input type="password" name="password" placeholder="New password" required minlength="8" autocomplete="new-password"/>
<label>Confirm new password</label>
<input type="password" name="password_confirm" placeholder="Confirm new password" required minlength="8" autocomplete="new-password"/>
<button class="btn" type="submit">Reset password</button>
</form>
{{ error_html|safe }}
</div>
</body>
</html>
