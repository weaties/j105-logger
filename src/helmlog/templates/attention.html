{% extends "base.html" %}
{% block title %}HelmLog — Notifications{% endblock %}
{% block extra_css %}
<style>
.notif-list{list-style:none;padding:0;margin:0}
.notif-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border-color);font-size:.85rem}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--border-row);border-radius:6px;padding:10px;margin:0 -10px 4px;border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--action);flex-shrink:0;margin-top:6px}
.notif-dot.read{background:transparent}
.notif-body{flex:1;min-width:0}
.notif-link{text-decoration:none;color:inherit;display:block}
.notif-link:hover .notif-header{text-decoration:underline}
.notif-header{color:var(--text-primary)}
.notif-actor{color:var(--accent);font-weight:600}
.notif-msg{color:var(--text-primary)}
.notif-meta{display:flex;gap:8px;align-items:center;margin-top:2px;flex-wrap:wrap}
.notif-time{color:var(--text-muted);font-size:.78rem}
.notif-session{color:var(--text-secondary);font-size:.78rem}
.notif-thread{color:var(--warning);font-size:.78rem}
.notif-type{font-size:.72rem;padding:2px 6px;border-radius:3px;font-weight:600}
.notif-type.mention{background:var(--border-color);color:var(--accent)}
.notif-type.reply{background:#1e3a2f;color:var(--success)}
.notif-type.new_thread{background:#2e2a1f;color:var(--warning)}
.notif-type.resolved{background:#1e2a3f;color:var(--accent)}
.notif-snippet{color:var(--text-secondary);font-size:.78rem;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
.notif-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
.ubtn{cursor:pointer;background:none;border:1px solid var(--action);color:var(--accent);border-radius:4px;padding:4px 10px;font-size:.8rem;white-space:nowrap}
.ubtn-sm{padding:2px 8px;font-size:.75rem}
.notif-btn{padding:8px 16px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--action);color:var(--action-text);margin-bottom:12px}
.session-group{margin-bottom:16px}
.session-group-header{font-size:.9rem;color:var(--text-secondary);margin:0 0 6px}
.session-group-header a{color:var(--accent);text-decoration:none}
.session-group-header a:hover{text-decoration:underline}
</style>
{% endblock %}
{% block content %}
<h1>Notifications</h1>
<div class="card">
<button class="notif-btn" id="mark-all-btn" onclick="markAllRead()">Mark All Read</button>
<div id="notif-container"><div class="empty">Loading…</div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function relTime(iso){
  if(!iso)return '';
  // Handle both with and without trailing Z
  const raw=iso.endsWith('Z')?iso:iso+'Z';
  const d=new Date(raw);
  if(isNaN(d.getTime()))return '';
  const now=new Date();
  const s=Math.floor((now-d)/1000);
  if(s<0)return 'just now';
  if(s<60)return 'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  const days=Math.floor(s/86400);
  if(days===1)return '1 day ago';
  return days+'d ago';
}

function snippet(text,max){
  if(!text)return '';
  if(text.length<=max)return text;
  return text.substring(0,max)+'\u2026';
}

function notifUrl(n){
  if(n.session_id && n.source_thread_id){
    return '/session/'+n.session_id+'#thread-'+n.source_thread_id;
  }
  if(n.session_id){
    return '/session/'+n.session_id;
  }
  return null;
}

async function loadNotifications(){
  const resp=await fetch('/api/notifications?limit=100');
  const notifs=await resp.json();
  const container=document.getElementById('notif-container');

  if(!notifs.length){
    container.innerHTML='<div class="empty">No notifications</div>';
    return;
  }

  // Group by session_id
  const groups={};const groupOrder=[];
  for(const n of notifs){
    const sid=n.session_id||'general';
    if(!groups[sid]){groups[sid]=[];groupOrder.push(sid);}
    groups[sid].push(n);
  }

  let html='';
  for(const sid of groupOrder){
    const items=groups[sid];
    html+='<div class="session-group">';
    if(sid!=='general'){
      const sessionName=items[0].session_name||('Session #'+sid);
      html+='<h3 class="session-group-header"><a href="/session/'+sid+'">'+esc(sessionName)+'</a></h3>';
    }
    html+='<ul class="notif-list">';
    for(const n of items){
      const unread=!n.read;
      const url=notifUrl(n);
      html+='<li class="notif-item'+(unread?' unread':'')+'">';
      html+='<span class="notif-dot'+(unread?'':' read')+'"></span>';
      html+='<div class="notif-body">';

      // Clickable link wrapping the content
      if(url){
        html+='<a class="notif-link" href="'+url+'" onclick="markReadNav(event,'+n.id+',\''+url+'\')">';
      }
      html+='<div class="notif-header">';
      html+='<span class="notif-actor">'+esc(n.actor_name||'Someone')+'</span> ';
      html+='<span class="notif-msg">'+esc(n.message||'')+'</span> ';
      html+='<span class="notif-type '+n.type+'">'+n.type.replace('_',' ')+'</span>';
      html+='</div>';

      // Meta line: time + thread title
      html+='<div class="notif-meta">';
      html+='<span class="notif-time">'+relTime(n.created_at)+'</span>';
      if(n.thread_title){
        html+='<span class="notif-thread">'+esc(n.thread_title)+'</span>';
      }
      html+='</div>';

      // Comment snippet
      if(n.comment_body){
        html+='<div class="notif-snippet">\u201c'+esc(snippet(n.comment_body,120))+'\u201d</div>';
      }

      if(url) html+='</a>';
      html+='</div>';

      // Actions
      html+='<div class="notif-actions">';
      if(unread) html+='<button class="ubtn ubtn-sm" onclick="event.stopPropagation();markRead('+n.id+')">Read</button>';
      html+='<button class="ubtn ubtn-sm" onclick="event.stopPropagation();dismiss('+n.id+')">Dismiss</button>';
      html+='</div>';
      html+='</li>';
    }
    html+='</ul></div>';
  }
  container.innerHTML=html;
}

async function markRead(id){
  await fetch('/api/notifications/'+id+'/read',{method:'POST'});
  loadNotifications();
}

async function markReadNav(e,id,url){
  e.preventDefault();
  await fetch('/api/notifications/'+id+'/read',{method:'POST'});
  window.location.href=url;
}

async function markAllRead(){
  await fetch('/api/notifications/read-all',{method:'POST'});
  loadNotifications();
}

async function dismiss(id){
  await fetch('/api/notifications/'+id,{method:'DELETE'});
  loadNotifications();
}

loadNotifications();
</script>
{% endblock %}
