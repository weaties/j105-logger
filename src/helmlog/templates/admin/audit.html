{% extends "base.html" %}
{% block title %}HelmLog — Audit Log{% endblock %}
{% block extra_css %}
<style>
h1{font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:12px}
.card{background:var(--bg-secondary);border-radius:12px;padding:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:6px 8px;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid #0d1a2e}
code{background:var(--border);padding:1px 5px;border-radius:3px;font-size:.78rem}
a{color:var(--accent);text-decoration:none}
</style>
{% endblock %}
{% block content %}
<h1 style="margin-bottom:12px">Audit Log</h1>
<div class="card">
<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Detail</th><th>IP</th></tr></thead>
<tbody>{{ audit_rows|safe }}</tbody>
</table>
{% if not has_entries %}
<p style="text-align:center;color:var(--text-secondary);padding:20px">No audit entries yet.</p>
{% endif %}
</div>
{% endblock %}
